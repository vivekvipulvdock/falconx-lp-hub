document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;gap:6px\">\n        <span style=\"font-size:12px;color:var(--t3)\">Sort<\u002Fspan>\n        <sc-for list=\"{{ sortChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <button onclick=\"{{ c.onClick }}\" style=\"font-family:Geist;font-size:12.5px;font-weight:{{ c.weight }};padding:6px 11px;border-radius:8px;cursor:pointer;border:1px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};transition:all .15s\">{{ c.label }}<\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STAGE filter row -->\n    <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:22px\">\n      <sc-for list=\"{{ stageChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ c.onClick }}\" style=\"font-family:'Geist Mono';font-size:11px;font-weight:500;letter-spacing:.02em;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid {{ c.border }};background:{{ c.bg }};color:{{ c.color }};transition:all .15s\">{{ c.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- GRID -->\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px\">\n      <sc-for list=\"{{ gridCompanies }}\" as=\"c\" hint-placeholder-count=\"8\">\n        <div onclick=\"{{ c.open }}\" style=\"position:relative;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease\" style-hover=\"transform:translateY(-3px);box-shadow:var(--shadowMd);border-color:var(--border2)\">\n          <div style=\"display:flex;align-items:flex-start;gap:12px;margin-bottom:13px\">\n            <div style=\"flex:none;width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-family:'Geist Mono';font-size:14px;font-weight:600;background:{{ c.tileBg }};color:{{ c.tileFg }};border:1px solid {{ c.tileBorder }}\">{{ c.mono }}<\u002Fdiv>\n            <div style=\"flex: \"><\u002Fpolyline>\n              <circle cx=\"{{ c.sparkEndX }}\" cy=\"{{ c.sparkEndY }}\" r=\"2\" fill=\"{{ c.sparkColor }}\"><\u002Fcircle>\n            <\u002Fsvg>\n          <\u002Fdiv>\n          <div style=\"margin-top:11px;font-size:10.5px;color:var(--t3);font-family:'Geist Mono'\">updated {{ c.updated }}<\u002Fdiv>\n          <sc-if value=\"{{ c.showFlags }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"position:absolute;top:14px;right:14px;display:flex;gap:4px\">\n              <sc-for list=\"{{ c.flags }}\" as=\"f\" hint-placeholder-count=\"2\">\n                <span title=\"{{ f.title }}\" style=\"width:8px;height:8px;border-radius:{{ f.radius }};background:{{ f.color }};display:block\"><\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <sc-if value=\"{{ emptyGrid }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"text-align:center;padding:60px;color:var(--t3);font-size:14px\">No companies match these filters.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===== COMPANY DEEP-DIVE ===== -->\n  <sc-if value=\"{{ onCompany }}\" hint-placeholder-val=\"{{ false }}\">\n  <main key=\"co-{{ coV.name }}\" style=\"max-width:1080px;margin:0 auto;padding:24px 28px 96px\">\n    <button onclick=\"{{ coV.back }}\" style=\"display:inline-flex;align-items:center;gap:7px;font-family:Geist;font-size:13px;font-weight:500;color:var(--t2);background:none;border:none;cursor:pointer;padding:6px 0;margin-bottom:18px\" style-hover=\"color:var(--text)\">← Portfolio<\u002Fbutton>\n\n    <!-- header -->\n    <div style=\"display:flex;align-items:flex-start;gap:18px;margin-bottom:22px\">\n      <div style=\"flex:none;width:64px;height:64px;border-radius:16px;display:grid;place-items:center;font-family:'Geist Mono';font-size:22px;font-weight:600;background:{{ coV.tileBg }};color:{{ coV.tileFg }};border:1px solid {{ coV.tileBorder }}\">{{ coV.mono }}<\u002Fdiv>\n      <div style=\"flex:1;min-width:0\">\n        <div style=\"display:flex;align-items:center;gap:11px;flex-wrap:wrap\">\n          <h1 style=\"font-size:26px;font-weight:600;letter-spacing:-.025em;margin:0\">{{ coV.name }}<\u002Fh1>\n          <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:{{ coV.statusBg }};color:{{ coV.statusColor }}\">{{ coV.statusLabel }}<\u002Fspan>\n          <span style=\"font-size:12px;font-weight:500;padding:3px 9px;border-radius:6px;background:var(--surface2);color:var(--t2);border:1px solid var(--border)\">{{ coV.sector }}<\u002Fspan>\n          <span style=\"font-family:'Geist Mono';font-size:11px;padding:3px 9px;border-radius:6px;background:var(--surface2);color:var(--t3);border:1px solid var(--border)\">{{ coV.stage }}<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:15px;color:var(--t2);margin:9px 0 0;line-height:1.5;max-width:680px\">{{ coV.thesis }}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- key facts -->\n    <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:32px\">\n      <sc-for list=\"{{ coV.facts }}\" as=\"f\" hint-placeholder-count=\"5\">\n        <div style=\"background:var(--surface);padding:14px 16px;display:flex;flex-direction:column;gap:4px\">\n          <span style=\"font-size:10.5px;color:var(--t3);font-weight:500\">{{ f.k }}<\u002Fspan>\n          <span style=\"font-family:'Geist Mono';font-size:15px;font-weight:500\">{{ f.v }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 320px;gap:28px;align-items:start\">\n      <!-- LEFT column -->\n      <div style=\"display:flex;flex-direction:column;gap:32px;min-width:0\">\n        <!-- investment summary -->\n        <section>\n          <h2 style=\"font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:0 0 12px\">Investment summary<\u002Fh2>\n          <p style=\"font-size:15px;line-height:1.65;color:var(--text);margin:0;max-width:62ch\">{{ coV.summary }}<\u002Fp>\n        <\u002Fsection>\n\n        <!-- KPIs -->\n        <section>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n            <h2 style=\"font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:0\">Performance &amp; KPIs<\u002Fh2>\n            <sc-if value=\"{{ coV.hiddenNote }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:11px;color:var(--t3);font-family:'Geist Mono'\">{{ coV.hiddenNote }}<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px\">\n            <sc-for list=\"{{ coV.kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n              <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:15px 16px\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:7px\">\n                  <span style=\"font-size:12px;color:var(--t2);font-weight:500\">{{ k.label }}<\u002Fspan>\n                  <sc-if value=\"{{ k.showFlag }}\" hint-placeholder-val=\"{{ false }}\">\n                    <span style=\"display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;padding:2px 6px;border-radius:4px;background:{{ k.confBg }};color:{{ k.confColor }}\"><span style=\"width:6px;height:6px;border-radius:{{ k.confRadius }};background:{{ k.confColor }}\"><\u002Fspan>{{ k.confLabel }}<\u002Fspan>\n                  <\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-family:'Geist Mono';font-size:22px;font-weight:600;letter-spacing:-.02em\">{{ k.value }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:5px\">\n                  <span style=\"font-family:'Geist Mono';font-size:11.5px;color:{{ k.deltaColor }}\">{{ k.delta }}<\u002Fspan>\n                  <sc-if value=\"{{ k.showFlag }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px;color:var(--t3);font-family:'Geist Mono'\">via {{ k.source }}<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- TIMELINE -->\n        <section>\n          <h2 style=\"font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:0 0 16px\">Chronology<\u002Fh2>\n          <div style=\"position:relative;padding-left:4px\">\n            <sc-for list=\"{{ coV.timeline }}\" as=\"e\" hint-placeholder-count=\"5\">\n              <div style=\"position:relative;display:grid;grid-template-columns:84px 1fr;gap:16px;padding-bottom:22px\">\n                <div style=\"font-family:'Geist Mono';font-size:11.5px;color:var(--t3);text-align:right;padding-top:4px\">{{ e.date }}<\u002Fdiv>\n                <div style=\"position:relative;padding-left:24px;border-left:1.5px solid var(--border)\">\n                  <span style=\"position:absolute;left:-8px;top:2px;width:15px;height:15px;border-radius:50%;background:var(--surface);border:1.5px solid {{ e.iconColor }};display:grid;place-items:center;font-size:7px;color:{{ e.iconColor }};line-height:1\">{{ e.icon }}<\u002Fspan>\n                  <p style=\"font-size:13.5px;line-height:1.5;color:var(--text);margin:2px 0 0\">{{ e.title }}<\u002Fp>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- NEWS -->\n        <section>\n          <h2 style=\"font-size:13px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:0 0 12px\">News &amp; updates<\u002Fh2>\n          <div style=\"display:flex;flex-direction:column;border:1px solid var(--border);border-radius:12px;overflow:hidden\">\n            <sc-for list=\"{{ coV.news }}\" as=\"nw\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:14px;padding:13px 16px;border-bottom:1px solid var(--border);background:var(--surface)\">\n                <span style=\"font-family:'Geist Mono';font-size:11px;color:var(--t3);flex:none;width:64px\">{{ nw.date }}<\u002Fspan>\n                <span style=\"font-size:13.5px;color:var(--text);flex:1;line-height:1.4\">{{ nw.title }}<\u002Fspan>\n                <span style=\"font-size:11px;color:var(--t3);flex:none\">{{ nw.src }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n\n      <!-- RIGHT column -->\n      <div style=\"display:flex;flex-direction:column;gap:20px;position:sticky;top:80px\">\n        <!-- highlights -->\n        <section style=\"background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:18px\">\n          <h2 style=\"font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:0 0 14px\">Highlights<\u002Fh2>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ coV.highlights }}\" as=\"h\" hint-placeholder-count=\"2\">\n              <p style=\"font-size:13.5px;line-height:1.55;color:var(--text);margin:0;padding-left:12px;border-left:2px solid var(--accent)\">{{ h }}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- internal notes -->\n        <sc-if value=\"{{ coV.showInternal }}\" hint-placeholder-val=\"{{ false }}\">\n        <section style=\"background:var(--amberSoft);border:1px solid color-mix(in srgb,var(--amber) 30%,transparent);border-radius:14px;padding:18px\">\n          <h2 style=\"display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--amber);margin:0 0 13px\"><span style=\"width:7px;height:7px;border-radius:2px;background:var(--amber)\"><\u002Fspan>Internal notes<\u002Fh2>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <sc-for list=\"{{ coV.internalNotes }}\" as=\"nt\" hint-placeholder-count=\"2\">\n              <div>\n                <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:600;color:{{ nt.color }};margin-bottom:5px\"><span style=\"width:6px;height:6px;border-radius:{{ nt.radius }};background:{{ nt.color }}\"><\u002Fspan>{{ nt.label }}<\u002Fspan>\n                <p style=\"font-size:12.5px;line-height:1.5;color:var(--text);margin:0\">{{ nt.text }}<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n        <\u002Fsc-if>\n\n        <!-- documents -->\n        <section style=\"background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px\">\n          <h2 style=\"font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);margin:0 0 12px\">Documents &amp; links<\u002Fh2>\n          <div style=\"display:flex;flex-direction:column;gap:2px\">\n            <sc-for list=\"{{ coV.docs }}\" as=\"d\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;transition:background .15s\" style-hover=\"background:var(--surface2)\">\n                <span style=\"flex:none;color:var(--t3);font-size:13px\">↗<\u002Fspan>\n                <span style=\"flex:1;font-size:13px;color:var(--text);line-height:1.3\">{{ d.label }}<\u002Fspan>\n                <span style=\"flex:none;font-size:10px;font-weight:500;color:var(--t3);font-family:'Geist Mono'\">{{ d.badge }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-if value=\"{{ coV.docsNote }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:11px;color:var(--t3);margin:11px 0 0;line-height:1.4\">{{ coV.docsNote }}<\u002Fp><\u002Fsc-if>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fmain>\n  <\u002Fsc-if>\n\n  <!-- ===== PERFORMANCE DASHBOARD ===== -->\n  <sc-if value=\"{{ onPerf }}\" hint-placeholder-val=\"{{ false }}\">\n  <main key=\"perf-{{ screen }}\" style=\"max-width:1240px;margin:0 auto;padding:40px 28px 96px\">\n    <div style=\"margin-bottom:26px\">\n      <h1 style=\"font-size:27px;font-weight:600;letter-spacing:-.025em;margin:0 0 7px\">Performance<\u002Fh1>\n      <p style=\"font-size:14.5px;color:var(--t2);margin:0\">Fund-wide value, multiple and exposure across the portfolio.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- aggregate stats -->\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px\">\n      <sc-for list=\"{{ perf.agg }}\" as=\"a\" hint-placeholder-count=\"4\">\n        <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px\">\n          <div style=\"font-size:11.5px;color:var(--t3);margin-bottom:6px\">{{ a.k }}<\u002Fdiv>\n          <div style=\"font-family:'Geist Mono';font-size:24px;font-weight:600;letter-spacing:-.02em\">{{ a.v }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- main chart -->\n    <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px 24px 16px;margin-bottom:18px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:18px\">\n        <div>\n          <h2 style=\"font-size:14px;font-weight:600;margin:0\">Portfolio value over time<\u002Fh2>\n          <p style=\"font-size:12px;color:var(--t3);margin:4px 0 0\">Marked value vs. capital investe w==='internal';\n    const themeClass=(st.theme==='dark'?'theme-dark':'')+(isInternal?' is-internal':'');\n    // nav\n    const navDef=[['Portfolio','home'],['Performance','performance'],['Newsletter','newsletter']];\n    const activeScreen = st.screen==='company'?'home':st.screen;\n    const navItems=navDef.map(([label,key])=>{\n      const active=activeScreen===key;\n      return {label,onClick:()=>this.setScreen(key==='home'?'home':key),\n        weight:active?600:500,color:active?'var(--text)':'var(--t2)',bg:active?'var(--surface2)':'transparent'};\n    });\n    // view toggle styling\n    const lpOn=!isInternal;\n    const v={\n      themeClass, screen:st.screen, isInternal,\n      onHome: st.screen==='home',\n      internalBarH: isInternal?'3px':'0px',\n      navItems,\n      goHome:()=>this.setScreen('home'),\n      setLp:()=>this.setView('lp'), setInternal:()=>this.setView('internal'),\n      lpBtnBg: lpOn?'var(--surface)':'transparent', lpBtnColor: lpOn?'var(--text)':'var(--t3)', lpBtnShadow: lpOn?'var(--shadow)':'none',\n      inBtnBg: isInternal?'var(--amberSoft)':'transparent', inBtnColor: isInternal?'var(--amber)':'var(--t3)', inBtnShadow: isInternal?'inset 0 0 0 1px var(--amber)':'none',\n      toggleTheme:()=>this.setState({theme:st.theme==='dark'?'light':'dark'}),\n      themeIcon: st.theme==='dark'?'\\u263C':'\\u263E',\n      fundPositioning:this.DB.fund.positioning,\n      deployedPct: Math.round(this.DB.fund.deployed/this.DB.fund.size*100)+'%',\n    };\n\n    // ---- HOME ----\n    const fund=this.DB.fund;\n    v.fundStats = isInternal ? [\n      {k:'Invested',v:'$'+fund.invested.toFixed(1)+'M',sub:'of $40.0M',color:'var(--text)'},\n      {k:'Companies',v:''+fund.companies,sub:'2 exited · 1 watch',color:'var(--text)'},\n      {k:'Portfolio value',v:'$'+fund.value.toFixed(1)+'M',sub:'marked, unaudited',color:'var(--text)'},\n      {k:'TVPI · DPI',v:fund.tvpi+'x',sub:'DPI '+fund.dpi+'x · est.',color:'var(--accent)'},\n      {k:'Net IRR',v:fund.irr,sub:'gross 38% · est.',color:'var(--text)'}\n    ] : [\n      {k:'Total invested',v:'$'+fund.invested.toFixed(1)+'M',sub:'across the fund',color:'var(--text)'},\n      {k:'Portfolio companies',v:''+fund.companies,sub:'incl. 2 exits',color:'var(--text)'},\n      {k:'Portfolio value',v:'$'+fund.value.toFixed(1)+'M',sub:'total value',color:'var(--text)'},\n      {k:'Blended multiple',v:fund.tvpi+'x',sub:'TVPI',color:'var(--accent)'},\n      {k:'Realized exits',v:''+fund.exits,sub:'2022–2026',color:'var(--text)'}\n    ];\n    // filters\n    const sectors=['All',...Array.from(new Set(this.DB.companies.map(c=>c.sector)))];\n    const stages=['All','Seed','Series A'];\n    const mkChip=(label,active,kind)=>({label,active,\n      weight:active?600:500,\n      bg:active?(kind==='stage'?'var(--text)':'var(--accent)'):'var(--surface)',\n      color:active?(kind==='stage'?'var(--bg)':'#fff'):'var(--t2)',\n      border:active?'transparent':'var(--border)'});\n    v.sectorChips=sectors.map(s=>({...mkChip(s,st.sector===s,'sector'),onClick:()=>this.setState({sector:s})}));\n    v.stageChips=stages.map(s=>({...mkChip(s,st.stage===s,'stage'),onClick:()=>this.setState({stage:s})}));\n    const sorts=[['recent','Recency'],['multiple','Multiple'],['value','Value'],['name','Name']];\n    v.sortChips=sorts.map(([k,label])=>({...mkChip(label,st.sort===k,'sort'),onClick:()=>this.setState({sort:k})}));\n    v.q=st.q; v.onSearch=(e)=>this.setState({q:e.target.value});\n    // grid\n    let list=this.DB.companies.filter(c=>\n      (st.sector==='All'||c.sector===st.sector)&&\n      (st.stage==='All'||c.stage===st.stage)&&\n      (!st.q||c.name.toLowerCase().includes(st.q.toLowerCase())||c.desc.toLowerCase().includes(st.q.toLowerCase())||c.sector.toLowerCase().includes(st.q.toLowerCase())));\n    const sorters={recent:(a,b)=>a.upd-b.upd,multiple:(a,b)=>b.mult-a.mult,value:(a,b)=>b.val-a.val,name:(a,b)=>a.name.localeCompare(b.name)};\n    list=[...list].sort(sorters[st.sort]);\n    v.emptyGrid=list.length===0;\n    v.gridCompanies=list.map((c,i)=>{\n      const sm=this.statusMeta(c.status); const t=this.tile(c.hue);\n      const pts=this.sparkPts(c.spark,76,24); const last=pts[pts.length-1].split(',');\n      return {id:c.id,name:c.name,mono:c.mono,desc:c.desc,sector:c.sector,stage:c.stage,\n        statusLabel:sm.label,statusColor:sm.color,statusBg:sm.bg,\n        multiple:c.mult.toFixed(1)+'x',multipleColor:this.multColor(c.mult),metricLabel:c.status==='exited'?'Realized':'Multiple (TVPI)',\n        updated:c.upd+'d ago',\n        tileBg:t.bg,tileFg:t.fg,tileBorder:t.border,\n        sparkPts:pts.join(' '),sparkColor:c.up===false?'var(--red)':(c.up?'var(--green)':'var(--t3)'),\n        sparkEndX:last[0],sparkEndY:last[1],\n        delay:(i%8*0.03).toFixed(2)+'s',\n        open:()=>this.open(c.id),\n        showFlags:isInternal, flags:this.flagsFor(c)};\n    });\n\n    // ---- other screens ----\n    v.onCompany = st.screen==='company';\n    v.onPerf = st.screen==='performance';\n    v.onNews = st.screen==='newsletter';\n    v.coV = (v.onCompany && this.co) ? this.companyView(this.co,isInternal) : {facts:[],kpis:[],timeline:[],news:[],highlights:[],docs:[],internalNotes:[]};\n    v.perf = v.onPerf ? this.perfView(isInternal) : {yTicks:[],xTicks:[],sectorBars:[],tableRows:[],headers:[],stage:{},agg:[]};\n    const nl=this.DB.newsletter;\n    v.nl = nl; v.nlDraft = isInternal;\n\n    return v;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
